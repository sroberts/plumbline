name: Verdict delta on merge

# Posts a comment on every merged PR showing how the change moved
# plumbline's own ACMM verdict (level + per-level scores). When the
# verdict level changed, the comment also nudges the author to
# update CLAUDE.md's project-status section, since that's where the
# README/agent context lives. The codebase teaching itself: a merge
# either reinforces the maturity story (no change) or shifts it,
# and shifts deserve a doc update.
#
# Closes the ACMM L5 self-improvement loop: a workflow on
# pull_request: closed that surfaces signal-driven feedback about
# instruction files (CLAUDE.md, copilot-instructions.md).

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  delta:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: check out merged head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need both head and base for the delta
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build plumbline
        run: go build -o /tmp/plumbline ./cmd/plumbline

      - name: assess head
        id: head
        run: |
          /tmp/plumbline assess --json . > /tmp/head.json
          echo "level=$(jq -r .verdict.level /tmp/head.json)" >> "$GITHUB_OUTPUT"
          echo "name=$(jq -r .verdict.name /tmp/head.json)" >> "$GITHUB_OUTPUT"

      - name: assess base
        id: base
        run: |
          # The base is the first parent of the merge commit (i.e.,
          # main right before the merge). We assess against that snapshot
          # for the delta. If checkout fails (shallow / squash), bail
          # with same-as-head so the comment still posts.
          base_sha=$(git rev-parse "${{ github.event.pull_request.merge_commit_sha }}^1" 2>/dev/null || echo "")
          if [ -z "$base_sha" ]; then
            echo "level=${{ steps.head.outputs.level }}" >> "$GITHUB_OUTPUT"
            echo "name=${{ steps.head.outputs.name }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git stash --include-untracked >/dev/null 2>&1 || true
          git checkout "$base_sha" -- .
          /tmp/plumbline assess --json . > /tmp/base.json
          git checkout HEAD -- .
          git stash pop >/dev/null 2>&1 || true
          echo "level=$(jq -r .verdict.level /tmp/base.json)" >> "$GITHUB_OUTPUT"
          echo "name=$(jq -r .verdict.name /tmp/base.json)" >> "$GITHUB_OUTPUT"

      - name: compose comment
        id: msg
        env:
          HEAD_LEVEL: ${{ steps.head.outputs.level }}
          HEAD_NAME: ${{ steps.head.outputs.name }}
          BASE_LEVEL: ${{ steps.base.outputs.level }}
          BASE_NAME: ${{ steps.base.outputs.name }}
        run: |
          {
            echo "body<<EOF"
            echo "## plumbline verdict delta"
            echo ""
            if [ "$HEAD_LEVEL" = "$BASE_LEVEL" ]; then
              echo "Verdict unchanged: **L${HEAD_LEVEL} (${HEAD_NAME})**."
              echo ""
              echo "_Per-level scores:_"
            else
              if [ "$HEAD_LEVEL" -gt "$BASE_LEVEL" ]; then
                arrow="↑"
              else
                arrow="↓"
              fi
              echo "Verdict moved **L${BASE_LEVEL} (${BASE_NAME}) ${arrow} L${HEAD_LEVEL} (${HEAD_NAME})**."
              echo ""
              echo "Consider updating \`CLAUDE.md\`'s project-status section so future agent sessions and contributors see the new state."
              echo ""
              echo "_Per-level scores:_"
            fi
            jq -r '.verdict.level_scores | to_entries[] | "  - L\(.key): \((.value*100|floor))%"' /tmp/head.json
            echo ""
            echo "<sub>Generated by .github/workflows/verdict-delta.yml. Re-run with workflow_dispatch if needed.</sub>"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BODY: ${{ steps.msg.outputs.body }}
        run: |
          printf '%s\n' "$BODY" | gh pr comment "$PR_NUMBER" --body-file -

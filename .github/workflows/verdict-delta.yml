name: Verdict delta on merge

# Posts a comment on every merged PR showing how the change moved
# plumbline's own ACMM verdict — the level move plus which signals
# flipped status. When the level changed, it also nudges the author to
# update CLAUDE.md's project-status section, since that's where the
# README/agent context lives. The codebase teaching itself: a merge
# either reinforces the maturity story (no change) or shifts it, and
# shifts deserve a doc update.
#
# The base verdict is read straight from the committed .plumbline.toon at
# the base commit (the drift gate in ci.yml keeps it current), so this
# workflow assesses only the head — no base checkout, no second full
# scan. Comparison + per-signal delta come from `plumbline diff`, which
# decodes the snapshot artifacts. (Closes the ACMM L5 self-improvement
# loop: a pull_request:closed workflow that surfaces signal-driven
# feedback about instruction files.)

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  delta:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: check out merged head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need the base commit's blob for `git show`
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build plumbline
        run: go build -o /tmp/plumbline ./cmd/plumbline

      - name: snapshot head
        # One scan, of the merged head. The base is not scanned.
        run: /tmp/plumbline snapshot --format json --out /tmp/head.json .

      - name: recover base snapshot
        id: base
        run: |
          base_sha=$(git rev-parse "${{ github.event.pull_request.merge_commit_sha }}^1" 2>/dev/null || echo "")
          if [ -n "$base_sha" ] && git show "$base_sha:.plumbline.toon" > /tmp/base.toon 2>/dev/null; then
            echo "have_base=true" >> "$GITHUB_OUTPUT"
          else
            # Base predates the committed artifact (or is unreachable) —
            # no baseline to diff against. Fall back to a level-only note.
            echo "have_base=false" >> "$GITHUB_OUTPUT"
          fi

      - name: compose comment
        id: msg
        run: |
          delim="PLUMBLINE_DELTA_EOF"
          {
            echo "body<<$delim"
            if [ "${{ steps.base.outputs.have_base }}" = "true" ]; then
              # Mixed formats are fine: base is TOON, head is JSON.
              /tmp/plumbline diff /tmp/base.toon /tmp/head.json
              changed=$(/tmp/plumbline diff /tmp/base.toon /tmp/head.json --json | jq -r '.level_changed')
              if [ "$changed" = "true" ]; then
                echo ""
                echo "The verdict level changed — consider updating \`CLAUDE.md\`'s project-status section so future agent sessions and contributors see the new state."
              fi
            else
              level=$(jq -r '.verdict.level' /tmp/head.json)
              name=$(jq -r '.verdict.name' /tmp/head.json)
              echo "## plumbline verdict delta"
              echo ""
              echo "No committed \`.plumbline.toon\` at the base commit, so there's no baseline to diff against. Baseline is now established at this merge."
              echo ""
              echo "Current verdict: **L${level} (${name})**."
            fi
            echo ""
            echo "<sub>Generated by .github/workflows/verdict-delta.yml. Re-run with workflow_dispatch if needed.</sub>"
            echo "$delim"
          } >> "$GITHUB_OUTPUT"

      - name: post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BODY: ${{ steps.msg.outputs.body }}
        run: |
          printf '%s\n' "$BODY" | gh pr comment "$PR_NUMBER" --body-file -

name: coverage-ratchet

# Weekly: if total coverage on main exceeds the current floor by ≥3
# percentage points, open a PR bumping the floor by 1pp. One-way
# ratchet — the floor only ever goes up.
on:
  schedule:
    - cron: '0 8 * * 1' # Mondays 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  ratchet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: measure coverage
        id: cov
        run: |
          go test -coverprofile=coverage.txt -covermode=atomic ./...
          total=$(go tool cover -func=coverage.txt | awk '/^total:/ {gsub("%",""); print $3}')
          floor=$(cat .coverage-floor 2>/dev/null || echo 60)
          echo "total=${total}" >> "$GITHUB_OUTPUT"
          echo "floor=${floor}" >> "$GITHUB_OUTPUT"
          echo "Total: ${total}%, Floor: ${floor}%"

      - name: decide
        id: decide
        run: |
          total='${{ steps.cov.outputs.total }}'
          floor='${{ steps.cov.outputs.floor }}'
          # Bump floor by 1 if total >= floor + 3.
          want=$(awk -v t="$total" -v f="$floor" 'BEGIN { if (t+0 >= f+0 + 3) { print f+1 } else { print f } }')
          if [ "$want" -gt "$floor" ]; then
            echo "bump=true" >> "$GITHUB_OUTPUT"
            echo "new_floor=${want}" >> "$GITHUB_OUTPUT"
          else
            echo "bump=false" >> "$GITHUB_OUTPUT"
            echo "No bump: ${total}% < ${floor}% + 3"
          fi

      - name: write new floor file
        if: steps.decide.outputs.bump == 'true'
        run: echo '${{ steps.decide.outputs.new_floor }}' > .coverage-floor

      - name: open ratchet PR
        if: steps.decide.outputs.bump == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: |
            chore(ci): ratchet coverage floor ${{ steps.cov.outputs.floor }} → ${{ steps.decide.outputs.new_floor }}

            Coverage on main is ${{ steps.cov.outputs.total }}%, which is
            at least 3pp above the current floor. The ratchet workflow
            bumps the floor by 1pp (one-way; floor only ever goes up).
          branch: chore/coverage-ratchet
          delete-branch: true
          title: 'chore(ci): ratchet coverage floor ${{ steps.cov.outputs.floor }} → ${{ steps.decide.outputs.new_floor }}'
          body: |
            Auto-generated by `coverage-ratchet.yml`.

            - Total coverage on main: **${{ steps.cov.outputs.total }}%**
            - Old floor: **${{ steps.cov.outputs.floor }}%**
            - New floor: **${{ steps.decide.outputs.new_floor }}%**

            The CI gate in `ci.yml` reads `.coverage-floor`. Merging this
            PR tightens the gate by 1pp.
          add-paths: |
            .coverage-floor

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$fmt_out"
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m

      - name: build
        run: go build ./...

      - name: test
        run: go test -race -count=1 -coverprofile=coverage.txt ./...

      - name: perf budgets (non-race)
        # Race detector adds ~10x allocations from synchronization
        # bookkeeping, which would either force the budget so loose
        # it stops catching real regressions or make the gate flake.
        # Run perf-budget tests in a separate non-race invocation.
        #
        # Wrapped in retry@v3: the perf-budget tests have wall-clock
        # ceilings (see internal/scanner/perf_budget_test.go) that
        # can flake on busy CI runners. Three attempts costs <1 minute
        # in the worst case and saves the build from a noisy CI runner
        # erasing real signal. (l4.error-recovery)
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          timeout_minutes: 5
          command: go test -count=1 -run "TestPerfBudget" ./internal/scanner/ ./internal/signals/

      - name: coverage threshold
        run: |
          total=$(go tool cover -func=coverage.txt | awk '/^total:/ {gsub("%",""); print $3}')
          echo "Total coverage: ${total}%"
          # Floor read from .coverage-floor (one line, percentage as integer).
          # The ratchet workflow bumps this when coverage exceeds floor + 3.
          floor=$(cat .coverage-floor 2>/dev/null || echo 60)
          echo "Floor: ${floor}%"
          awk -v t="$total" -v f="$floor" 'BEGIN { if (t+0 < f+0) { exit 1 } }'

      - name: codecov upload
        # Only on push to main; PR runs would clutter codecov with
        # transient checks for branches that may never merge.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.txt
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

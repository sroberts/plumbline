name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$fmt_out"
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m

      - name: build
        run: go build ./...

      - name: test
        run: go test -race -count=1 -coverprofile=coverage.txt ./...

      - name: perf budgets (non-race)
        # Race detector adds ~10x allocations from synchronization
        # bookkeeping, which would either force the budget so loose
        # it stops catching real regressions or make the gate flake.
        # Run perf-budget tests in a separate non-race invocation.
        run: go test -count=1 -run "TestPerfBudget" ./internal/scanner/ ./internal/signals/

      - name: coverage threshold
        run: |
          total=$(go tool cover -func=coverage.txt | awk '/^total:/ {gsub("%",""); print $3}')
          echo "Total coverage: ${total}%"
          # Floor: 60%. The aspirational target in codecov.yml is the
          # same; we ratchet both up together as coverage improves.
          awk -v t="$total" 'BEGIN { if (t+0 < 60) { exit 1 } }'

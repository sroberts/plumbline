name: Regenerate signal docs

# Triggered on every PR. Regenerates docs/SIGNALS.md from the
# registered catalog (cmd/gen-signal-docs) and either:
#   - exits clean if the checked-in file already matches, or
#   - opens a follow-up PR with the regenerated file.
#
# This closes the L5 docs-from-prs loop: docs stay in lockstep with
# the signal catalog without anyone remembering to re-run a make
# target. Signal authors edit l2/l3/l4/l5/*.go; SIGNALS.md catches up
# on its own.

on:
  pull_request:
  # workflow_dispatch is the manual escape hatch — useful when the
  # initial commit landed before this workflow was wired up.
  workflow_dispatch:

permissions:
  # Need write to open the docs-regen PR via peter-evans/create-pull-request.
  contents: write
  pull-requests: write

jobs:
  regen-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: regenerate docs/SIGNALS.md
        run: go run ./cmd/gen-signal-docs -out docs/SIGNALS.md

      - name: detect drift
        id: drift
        run: |
          if git diff --quiet -- docs/SIGNALS.md; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "docs/SIGNALS.md is in sync with the catalog."
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "::warning::docs/SIGNALS.md drifted from the catalog; opening a follow-up PR."
            git diff -- docs/SIGNALS.md
          fi

      - name: open follow-up PR if drift
        if: steps.drift.outputs.drift == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/regen-signal-docs
          base: main
          title: "docs: regenerate SIGNALS.md from catalog"
          commit-message: |
            docs: regenerate SIGNALS.md from catalog

            Auto-generated by .github/workflows/docs-signals.yml after a
            signal catalog change in PR #${{ github.event.pull_request.number }}.
          body: |
            Auto-generated catch-up: `docs/SIGNALS.md` drifted from `signals.Default`
            after PR #${{ github.event.pull_request.number }}. Regenerated via
            `cmd/gen-signal-docs`.
          delete-branch: true
